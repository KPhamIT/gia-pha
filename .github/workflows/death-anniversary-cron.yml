# Gửi push notification ngày giỗ — 07:00 Asia/Ho_Chi_Minh (00:00 UTC).
# Cấu hình secrets: docs/cron-github-actions.md

name: Death anniversary cron

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call backend cron endpoint
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Missing GitHub secrets: API_URL and/or CRON_SECRET"
            exit 1
          fi

          base="${API_URL%/}"
          url="${base}/notifications/cron/death-anniversary"

          echo "POST ${url}"
          http_code=$(curl -sS -o /tmp/cron-body.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${url}")

          echo "HTTP ${http_code}"
          cat /tmp/cron-body.json
          echo

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            exit 1
          fi
